<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>OneB</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback (encoder half — see index.html for the decoder).
      // GitHub Pages serves this file for any unmatched path; it redirects back to
      // index.html with the intended path encoded in the query string, since GitHub
      // Pages has no server-side rewrite for client-side (React Router) routes.
      // See https://github.com/rafgraph/spa-github-pages.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
